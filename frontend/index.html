<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgorIA — Tutor de Álgebra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-card: #161d30;
            --bg-input: #131a2c;
            --accent: #38bdf8;
            --accent-soft: #67e8f9;
            --accent-glow: rgba(56,189,248,0.2);
            --accent-subtle: rgba(56,189,248,0.06);
            --green: #34d399;
            --green-glow: rgba(52,211,153,0.15);
            --text-primary: #e8edf5;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(56,189,248,0.1);
            --user-bubble: linear-gradient(135deg,#0ea5e9,#0284c7);
            --bot-bubble: #1a2238;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'DM Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);height:100vh;overflow:hidden;position:relative}
        #particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
        .ambient-glow{position:fixed;border-radius:50%;filter:blur(140px);pointer-events:none;z-index:0}
        .glow-1{width:450px;height:450px;background:rgba(56,189,248,0.06);top:-120px;right:-80px}
        .glow-2{width:350px;height:350px;background:rgba(52,211,153,0.04);bottom:-80px;left:-80px}
        .cursor-glow{position:fixed;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:opacity .3s}
        .app-container{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto;padding:0 20px}
        .header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px;border-bottom:1px solid var(--border);flex-shrink:0}
        .header-left{display:flex;align-items:center;gap:14px}
        .logo-mark{width:42px;height:42px;background:var(--user-bubble);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;box-shadow:0 3px 16px var(--accent-glow)}
        .header-title h1{font-family:'Outfit',sans-serif;font-size:1.45rem;font-weight:800;letter-spacing:-0.03em;color:var(--text-primary)}
        .header-title h1 span{color:var(--accent)}
        .header-title p{font-size:.78rem;color:var(--text-muted);margin-top:1px}
        .header-right{display:flex;align-items:center;gap:10px}
        .status-badge{display:flex;align-items:center;gap:6px;font-size:.73rem;color:var(--green);background:var(--green-glow);padding:5px 11px;border-radius:20px;border:1px solid rgba(52,211,153,0.18)}
        .status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse-dot 2s infinite}
        @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
        .chat-area{flex:1;overflow-y:auto;padding:24px 0;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--accent-glow) transparent}
        .chat-area::-webkit-scrollbar{width:4px}
        .chat-area::-webkit-scrollbar-thumb{background:var(--accent-glow);border-radius:4px}
        .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:22px;animation:fadeUp .7s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .welcome-icon{width:72px;height:72px;background:var(--user-bubble);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;box-shadow:0 6px 32px var(--accent-glow)}
        .welcome h2{font-family:'Outfit',sans-serif;font-size:1.65rem;font-weight:800;color:var(--text-primary)}
        .welcome h2 span{color:var(--accent)}
        .welcome p{color:var(--text-secondary);max-width:440px;line-height:1.6;font-size:.93rem}
        .quick-prompts{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:600px}
        .quick-prompt{padding:10px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;color:var(--text-secondary);font-size:.84rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
        .quick-prompt:hover{border-color:var(--accent);color:var(--accent-soft);background:var(--accent-subtle);transform:translateY(-2px);box-shadow:0 4px 16px var(--accent-glow)}
        .message{display:flex;gap:12px;animation:msgIn .3s ease;max-width:85%}
        @keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .message.user{align-self:flex-end;flex-direction:row-reverse}
        .message-avatar{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:4px}
        .message.bot .message-avatar{background:var(--user-bubble);color:#fff;font-weight:700;box-shadow:0 2px 10px var(--accent-glow)}
        .message.user .message-avatar{background:var(--bg-card);border:1px solid var(--border)}
        .message-content{padding:14px 18px;border-radius:16px;line-height:1.7;font-size:.91rem}
        .message.bot .message-content{background:var(--bot-bubble);border:1px solid var(--border);color:var(--text-primary);border-bottom-left-radius:4px}
        .message.user .message-content{background:var(--user-bubble);color:#fff;border-bottom-right-radius:4px}
        .message-content p{margin-bottom:8px}
        .message-content p:last-child{margin-bottom:0}
        .message-content strong{color:var(--accent-soft);font-weight:600}
        .message-content em{font-style:italic;color:var(--text-secondary)}
        .message-content code{font-family:'JetBrains Mono',monospace;background:rgba(56,189,248,0.1);padding:2px 6px;border-radius:4px;font-size:.84em}
        .message-content ul,.message-content ol{margin:8px 0;padding-left:20px}
        .message-content li{margin-bottom:4px}
        .message-content .katex-display{margin:12px 0;padding:12px 16px;background:rgba(56,189,248,0.04);border-radius:10px;border:1px solid rgba(56,189,248,0.08);overflow-x:auto}
        .message-content .katex{font-size:1.05em;color:var(--text-primary)}
        .typing-indicator{display:flex;gap:12px;animation:msgIn .3s ease}
        .typing-dots{display:flex;align-items:center;gap:5px;padding:16px 20px;background:var(--bot-bubble);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px}
        .typing-dots span{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:typingBounce 1.4s ease-in-out infinite}
        .typing-dots span:nth-child(2){animation-delay:.15s}
        .typing-dots span:nth-child(3){animation-delay:.3s}
        @keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:1}}
        .input-area{padding:14px 0 18px;border-top:1px solid var(--border);flex-shrink:0}
        .input-wrapper{display:flex;gap:10px;align-items:flex-end;background:var(--bg-input);border:1px solid var(--border);border-radius:16px;padding:8px 8px 8px 18px;transition:all .25s}
        .input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow),0 4px 20px rgba(0,0,0,0.2)}
        .input-wrapper textarea{flex:1;background:transparent;border:none;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:.91rem;resize:none;outline:none;max-height:120px;padding:8px 0;line-height:1.5}
        .input-wrapper textarea::placeholder{color:var(--text-muted)}
        .send-btn{width:42px;height:42px;background:var(--user-bubble);border:none;border-radius:12px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
        .send-btn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 4px 16px var(--accent-glow)}
        .send-btn:disabled{opacity:.35;cursor:not-allowed}
        .send-btn svg{width:18px;height:18px}
        .footer{text-align:center;padding:6px 0 12px;flex-shrink:0}
        .footer p{font-size:.7rem;color:var(--text-muted);letter-spacing:.015em}
        .footer a{color:var(--accent);text-decoration:none}
        .footer a:hover{text-decoration:underline}
        .clear-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-size:.76rem;padding:5px 12px;border-radius:8px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
        .clear-btn:hover{border-color:#f87171;color:#f87171;background:rgba(248,113,113,0.08)}
        @media(max-width:640px){.app-container{padding:0 12px}.header-title h1{font-size:1.2rem}.welcome h2{font-size:1.35rem}.quick-prompts{flex-direction:column;align-items:center}.message{max-width:92%}.status-badge span:last-child{display:none}}
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <div class="logo-mark">∑</div>
                <div class="header-title">
                    <h1>Algor<span>IA</span></h1>
                    <p>Tutor inteligente de Álgebra · UAI</p>
                </div>
            </div>
            <div class="header-right">
                <button class="clear-btn" onclick="clearChat()" title="Limpiar conversación">✕ Limpiar</button>
                <div class="status-badge"><div class="status-dot"></div><span>En línea</span></div>
            </div>
        </header>
        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">∑</div>
                <h2>¡Hola! Soy Algor<span>IA</span></h2>
                <p>Tu tutor de Álgebra universitaria. Te guío paso a paso sin darte la respuesta directa — porque aprender es el verdadero objetivo.</p>
                <div class="quick-prompts">
                    <button class="quick-prompt" onclick="sendQuick(this)">Explicame vectores en R²</button>
                    <button class="quick-prompt" onclick="sendQuick(this)">¿Cómo resuelvo un sistema 3×3?</button>
                    <button class="quick-prompt" onclick="sendQuick(this)">¿Qué es una transformación lineal?</button>
                    <button class="quick-prompt" onclick="sendQuick(this)">Ayudame con matrices inversas</button>
                </div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="msgInput" rows="1" placeholder="Escribí tu pregunta de Álgebra..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
        <footer class="footer">
            <p>Hecho por <strong>Angelo Perrotta</strong> · Ingeniería en Sistemas · <a href="https://www.uai.edu.ar" target="_blank" rel="noopener">UAI</a></p>
        </footer>
    </div>
    <script>
        const BACKEND='https://chatbot-educativo-de-lgebra-con-ia-uai-production.up.railway.app';
        const sessionId='sess-'+Date.now()+'-'+Math.random().toString(36).slice(2,9);
        let isWaiting=false;
        const chatArea=document.getElementById('chatArea');
        const msgInput=document.getElementById('msgInput');
        const sendBtn=document.getElementById('sendBtn');
        const welcome=document.getElementById('welcome');
        const cursorGlow=document.getElementById('cursorGlow');

        document.addEventListener('mousemove',e=>{cursorGlow.style.left=e.clientX+'px';cursorGlow.style.top=e.clientY+'px'});

        // Particles
        (function(){
            const c=document.getElementById('particles'),ctx=c.getContext('2d');let ps=[];const n=40;
            function resize(){c.width=innerWidth;c.height=innerHeight}resize();addEventListener('resize',resize);
            for(let i=0;i<n;i++)ps.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.8+.4,o:Math.random()*.2+.04});
            function draw(){ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(56,189,248,${p.o})`;ctx.fill()});
            for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<110){ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);ctx.strokeStyle=`rgba(56,189,248,${.045*(1-d/110)})`;ctx.lineWidth=.5;ctx.stroke()}}
            requestAnimationFrame(draw)}draw()
        })();

        function renderMath(el){if(typeof renderMathInElement==='function')renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'\\[',right:'\\]',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false}],throwOnError:false,trust:true})}

        function sendQuick(el){msgInput.value=el.textContent;sendMessage()}
        function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
        function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
        function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

        function formatResponse(text){
            text=text.replace(/^\s+/,'');
            const lb=[];
            text=text.replace(/\$\$([\s\S]*?)\$\$/g,(_,m)=>{lb.push('$$'+m+'$$');return`%%L${lb.length-1}%%`});
            text=text.replace(/\\\[([\s\S]*?)\\\]/g,(_,m)=>{lb.push('\\['+m+'\\]');return`%%L${lb.length-1}%%`});
            text=text.replace(/\$(.+?)\$/g,(_,m)=>{lb.push('$'+m+'$');return`%%L${lb.length-1}%%`});
            text=text.replace(/\\\((.+?)\\\)/g,(_,m)=>{lb.push('\\('+m+'\\)');return`%%L${lb.length-1}%%`});
            let h=escapeHtml(text);
            h=h.replace(/%%L(\d+)%%/g,(_,i)=>lb[parseInt(i)]);
            h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
            h=h.replace(/__(.+?)__/g,'<strong>$1</strong>');
            h=h.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<em>$1</em>');
            h=h.replace(/`(.+?)`/g,'<code>$1</code>');
            h=h.split('\n\n').map(p=>`<p>${p.trim()}</p>`).join('');
            h=h.replace(/\n/g,'<br>');
            return h;
        }

        function addMessage(role,content){
            if(welcome)welcome.style.display='none';
            const msg=document.createElement('div');msg.className=`message ${role}`;
            const av=document.createElement('div');av.className='message-avatar';av.textContent=role==='bot'?'∑':'👤';
            const bb=document.createElement('div');bb.className='message-content';
            bb.innerHTML=role==='bot'?formatResponse(content):`<p>${escapeHtml(content)}</p>`;
            msg.appendChild(av);msg.appendChild(bb);chatArea.appendChild(msg);
            if(role==='bot')renderMath(bb);
            chatArea.scrollTop=chatArea.scrollHeight;
        }

        function showTyping(){
            const el=document.createElement('div');el.className='typing-indicator';el.id='typingIndicator';
            el.innerHTML=`<div class="message-avatar" style="background:var(--user-bubble);color:#fff;font-weight:700;box-shadow:0 2px 10px var(--accent-glow)">∑</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
            chatArea.appendChild(el);chatArea.scrollTop=chatArea.scrollHeight;
        }
        function hideTyping(){const el=document.getElementById('typingIndicator');if(el)el.remove()}

        async function sendMessage(){
            const text=msgInput.value.trim();if(!text||isWaiting)return;
            isWaiting=true;sendBtn.disabled=true;msgInput.value='';msgInput.style.height='auto';
            addMessage('user',text);showTyping();
            try{
                const res=await fetch(`${BACKEND}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,materia:'algebra',session_id:sessionId})});
                hideTyping();
                if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.detail||`Error ${res.status}`)}
                const data=await res.json();addMessage('bot',data.response);
            }catch(err){hideTyping();addMessage('bot',`⚠️ ${err.message}\n\nReintentá en unos segundos.`)}
            finally{isWaiting=false;sendBtn.disabled=false;msgInput.focus()}
        }

        async function clearChat(){
            try{await fetch(`${BACKEND}/reset`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId})})}catch(e){}
            chatArea.querySelectorAll('.message,.typing-indicator').forEach(el=>el.remove());
            if(welcome)welcome.style.display='flex';
        }
        msgInput.focus();
    </script>
</body>
</html>
