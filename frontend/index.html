<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgorIA — Tutor de Álgebra</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-card: #161d30;
            --bg-input: #131a2c;
            --accent: #38bdf8;
            --accent-soft: #67e8f9;
            --accent-glow: rgba(56,189,248,0.2);
            --accent-subtle: rgba(56,189,248,0.06);
            --green: #34d399;
            --green-glow: rgba(52,211,153,0.15);
            --text-primary: #e8edf5;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(56,189,248,0.1);
            --user-bubble: linear-gradient(135deg,#0ea5e9,#0284c7);
            --bot-bubble: #1a2238;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'DM Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);height:100vh;overflow:hidden;position:relative}
        #particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
        .ambient-glow{position:fixed;border-radius:50%;filter:blur(140px);pointer-events:none;z-index:0}
        .glow-1{width:450px;height:450px;background:rgba(56,189,248,0.06);top:-120px;right:-80px}
        .glow-2{width:350px;height:350px;background:rgba(52,211,153,0.04);bottom:-80px;left:-80px}
        .cursor-glow{display:none}
        .app-container{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto;padding:0 20px}
        .header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px;border-bottom:1px solid var(--border);flex-shrink:0}
        .header-left{display:flex;align-items:center;gap:14px}
        .logo-mark{width:42px;height:42px;background:var(--user-bubble);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;box-shadow:0 3px 16px var(--accent-glow)}
        .header-title h1{font-family:'Outfit',sans-serif;font-size:1.45rem;font-weight:800;letter-spacing:-0.03em;color:var(--text-primary)}
        .header-title h1 span{color:var(--accent)}
        .header-title p{font-size:.78rem;color:var(--text-muted);margin-top:1px}
        .header-right{display:flex;align-items:center;gap:10px}
        .status-badge{display:flex;align-items:center;gap:6px;font-size:.73rem;color:var(--green);background:var(--green-glow);padding:5px 11px;border-radius:20px;border:1px solid rgba(52,211,153,0.18)}
        .status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse-dot 2s infinite}
        @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
        .chat-area{flex:1;overflow-y:auto;padding:24px 0;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--accent-glow) transparent}
        .chat-area::-webkit-scrollbar{width:4px}
        .chat-area::-webkit-scrollbar-thumb{background:var(--accent-glow);border-radius:4px}
        .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;animation:fadeUp .7s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .welcome-icon{width:72px;height:72px;background:var(--user-bubble);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;box-shadow:0 6px 32px var(--accent-glow)}
        .welcome h2{font-family:'Outfit',sans-serif;font-size:1.65rem;font-weight:800;color:var(--text-primary)}
        .welcome h2 span{color:var(--accent)}
        .welcome-greeting{color:var(--text-primary);max-width:440px;line-height:1.6;font-size:.97rem;font-weight:500}
        .welcome-motive{color:var(--text-secondary);max-width:440px;line-height:1.6;font-size:.88rem}
        .quick-prompts{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:600px}
        .quick-prompt{padding:10px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);font-size:.84rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
        .quick-prompt:hover{border-color:var(--accent);color:var(--accent-soft);background:var(--accent-subtle);transform:translateY(-2px);box-shadow:0 4px 16px var(--accent-glow)}
        .message{display:flex;gap:12px;animation:msgIn .3s ease;max-width:85%}
        @keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .message.user{align-self:flex-end;flex-direction:row-reverse}
        .message-avatar{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:4px}
        .message.bot .message-avatar{background:var(--user-bubble);color:#fff;font-weight:700;box-shadow:0 2px 10px var(--accent-glow)}
        .message.user .message-avatar{background:var(--bg-card);border:1px solid var(--border)}
        .message-content{padding:14px 18px;border-radius:10px;line-height:1.7;font-size:.91rem}
        .message.bot .message-content{background:var(--bot-bubble);border:1px solid var(--border);color:var(--text-primary);border-bottom-left-radius:4px}
        .message.user .message-content{background:var(--user-bubble);color:#fff;border-bottom-right-radius:4px}
        .message-content p{margin-bottom:8px}
        .message-content p:last-child{margin-bottom:0}
        .message-content strong{color:var(--accent-soft);font-weight:600}
        .message-content em{font-style:italic;color:var(--text-secondary)}
        .message-content code{font-family:'JetBrains Mono',monospace;background:rgba(56,189,248,0.1);padding:2px 6px;border-radius:4px;font-size:.84em}
        .message-content ul,.message-content ol{margin:8px 0;padding-left:20px}
        .message-content li{margin-bottom:4px}
        .message-content .katex-display{margin:12px 0;padding:12px 16px;background:rgba(56,189,248,0.04);border-radius:10px;border:1px solid rgba(56,189,248,0.08);overflow-x:auto}
        .message-content .katex{font-size:1.05em;color:var(--text-primary)}
        .typing-indicator{display:flex;gap:12px;animation:msgIn .3s ease}
        .typing-dots{display:flex;align-items:center;gap:5px;padding:16px 20px;background:var(--bot-bubble);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px}
        .typing-dots span{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:typingBounce 1.4s ease-in-out infinite}
        .typing-dots span:nth-child(2){animation-delay:.15s}
        .typing-dots span:nth-child(3){animation-delay:.3s}
        @keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:1}}
        .input-area{padding:14px 0 18px;border-top:1px solid var(--border);flex-shrink:0}
        .input-wrapper{display:flex;gap:10px;align-items:flex-end;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;padding:8px 8px 8px 18px;transition:all .25s}
        .input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow),0 4px 20px rgba(0,0,0,0.2)}
        .input-wrapper textarea{flex:1;background:transparent;border:none;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:.91rem;resize:none;outline:none;max-height:120px;padding:8px 0;line-height:1.5}
        .input-wrapper textarea::placeholder{color:var(--text-muted)}
        .send-btn{width:42px;height:42px;background:var(--user-bubble);border:none;border-radius:12px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
        .send-btn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 4px 16px var(--accent-glow)}
        .send-btn:disabled{opacity:.35;cursor:not-allowed}
        .send-btn svg{width:18px;height:18px}
        .footer{text-align:center;padding:6px 0 12px;flex-shrink:0}
        .footer p{font-size:.7rem;color:var(--text-muted);letter-spacing:.015em}
        .footer a{color:var(--accent);text-decoration:none}
        .footer a:hover{text-decoration:underline}
        .clear-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-size:.76rem;padding:5px 12px;border-radius:8px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
        .clear-btn:hover{border-color:#f87171;color:#f87171;background:rgba(248,113,113,0.08)}

        /* --- Admin gear --- */
        .admin-gear{position:fixed;bottom:22px;right:22px;width:44px;height:44px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text-secondary);text-decoration:none;z-index:200;transition:all .2s;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
        .admin-gear:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-subtle);box-shadow:0 4px 20px var(--accent-glow)}

        /* --- Auth overlay --- */
        .auth-overlay{position:fixed;inset:0;z-index:500;background:rgba(11,15,25,0.97);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeUp .5s ease}
        .auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:24px;padding:40px 36px;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 8px 48px rgba(0,0,0,0.5)}
        .auth-logo{width:64px;height:64px;background:var(--user-bubble);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;box-shadow:0 4px 24px var(--accent-glow)}
        .auth-card h2{font-family:'Outfit',sans-serif;font-size:1.6rem;font-weight:800;color:var(--text-primary);letter-spacing:-0.03em}
        .auth-card h2 span{color:var(--accent)}
        .auth-subtitle{font-size:.83rem;color:var(--text-muted);margin-top:-10px}
        .auth-tabs{display:flex;gap:8px;background:var(--bg-input);border-radius:10px;padding:4px;width:100%}
        .auth-tab{flex:1;padding:8px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--text-muted)}
        .auth-tab.active{background:var(--user-bubble);color:#fff;box-shadow:0 2px 10px var(--accent-glow)}
        .auth-form{display:flex;flex-direction:column;gap:12px;width:100%}
        .auth-input{width:100%;padding:12px 16px;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:.91rem;outline:none;transition:all .2s}
        .auth-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
        .auth-input::placeholder{color:var(--text-muted)}
        .auth-btn{width:100%;padding:13px;background:var(--user-bubble);border:none;border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
        .auth-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 18px var(--accent-glow)}
        .auth-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
        .auth-error{font-size:.83rem;color:#f87171;text-align:center;min-height:20px}
        .auth-hint{font-size:.78rem;color:var(--text-muted);text-align:center}

        /* --- Theme toggle --- */
        .theme-toggle{width:34px;height:34px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .2s;color:var(--text-secondary);padding:0}
        .theme-toggle:hover{border-color:var(--accent);color:var(--accent)}

        /* --- Light mode --- */
        body.light{--bg-primary:#f8fafc;--bg-card:#ffffff;--bg-input:#f1f5f9;--text-primary:#1e293b;--text-secondary:#475569;--text-muted:#94a3b8;--bot-bubble:#f1f5f9;--border:rgba(56,189,248,0.15)}
        body.light .message.user .message-content{color:#fff}
        body.light .typing-dots span{background:var(--accent)}
        body.light canvas#particles{opacity:.4}

        /* --- History panel --- */
        .history-backdrop{position:fixed;inset:0;z-index:399;background:rgba(11,15,25,0.55);display:none}
        .history-backdrop.open{display:block}
        .history-panel{position:fixed;top:0;left:0;height:100vh;width:320px;background:var(--bg-card);border-right:1px solid var(--border);z-index:400;transform:translateX(-100%);transition:transform .3s ease;display:flex;flex-direction:column;overflow:hidden}
        .history-panel.open{transform:translateX(0)}
        .history-header{padding:18px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .history-header h3{font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700}
        .history-close{background:transparent;border:none;color:var(--text-muted);font-size:1.1rem;cursor:pointer;padding:4px 8px;border-radius:6px;font-family:'DM Sans',sans-serif}
        .history-close:hover{color:var(--text-primary)}
        .history-list{flex:1;overflow-y:auto;padding:6px 0}
        .history-session{padding:11px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);transition:background .15s}
        .history-session:hover{background:rgba(255,255,255,0.04)}
        .history-session-date{font-size:.7rem;color:var(--text-muted);margin-bottom:3px}
        .history-session-preview{font-size:.82rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:250px}
        .history-empty{padding:40px 16px;text-align:center;color:var(--text-muted);font-size:.84rem}
        .readonly-banner{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.22);color:#fbbf24;font-size:.81rem;padding:9px 14px;border-radius:9px;display:none;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px;flex-shrink:0}
        .readonly-banner button{background:transparent;border:1px solid rgba(251,191,36,0.35);color:#fbbf24;font-size:.77rem;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
        /* --- Char counter --- */
        .char-counter{font-size:.71rem;color:var(--text-muted);text-align:right;padding:3px 6px 0}
        .char-counter.warn{color:#f87171}
        /* --- History footer --- */
        .history-footer{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
        .history-back-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--text-secondary);font-size:.79rem;padding:8px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
        .history-back-btn:hover{border-color:var(--accent);color:var(--accent)}

        /* --- Suggestions --- */
        .suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;padding-left:44px}
        .suggestion-btn{padding:5px 11px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);font-size:.77rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s}
        .suggestion-btn:hover{border-color:var(--accent);color:var(--accent-soft);background:var(--accent-subtle)}

        /* --- UAI badge --- */
        .uai-badge{display:none;align-items:center;gap:6px;color:var(--green);font-size:.82rem;background:var(--green-glow);border:1px solid rgba(52,211,153,0.25);padding:6px 12px;border-radius:8px}

        /* --- Feedback popup --- */
        .feedback-overlay{position:fixed;inset:0;z-index:600;background:rgba(11,15,25,0.7);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeUp .4s ease}
        .feedback-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:28px 28px 24px;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
        .feedback-title{font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text-primary);text-align:center}
        .star-row{display:flex;gap:8px}
        .star{font-size:2rem;color:var(--text-muted);cursor:pointer;transition:color .15s,transform .15s}
        .star:hover,.star.selected{color:#fbbf24;transform:scale(1.15)}
        .feedback-card textarea{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:.88rem;padding:10px 14px;outline:none;resize:none}
        .feedback-card textarea:focus{border-color:var(--accent)}
        .feedback-btns{display:flex;gap:10px;width:100%}
        .feedback-btns .auth-btn{flex:1}

        @media(max-width:640px){.app-container{padding:0 12px}.header-title h1{font-size:1.2rem}.welcome h2{font-size:1.35rem}.quick-prompts{flex-direction:column;align-items:center}.message{max-width:92%}.status-badge span:last-child{display:none}.auth-card{padding:30px 22px}}
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <!-- History panel -->
    <div class="history-backdrop" id="historyBackdrop" onclick="closeHistoryPanel()"></div>
    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <h3>Conversaciones</h3>
            <button class="history-close" onclick="closeHistoryPanel()">✕</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="history-empty">Cargando...</div>
        </div>
        <div class="history-footer">
            <button class="history-back-btn" onclick="closeHistoryPanel()">← Volver al chat actual</button>
        </div>
    </div>

    <!-- Feedback popup -->
    <div class="feedback-overlay" id="feedbackOverlay" style="display:none">
        <div class="feedback-card">
            <p class="feedback-title">¿Cómo viene la experiencia?</p>
            <div class="star-row" id="starRow">
                <span class="star" data-v="1">★</span>
                <span class="star" data-v="2">★</span>
                <span class="star" data-v="3">★</span>
                <span class="star" data-v="4">★</span>
                <span class="star" data-v="5">★</span>
            </div>
            <textarea id="feedbackMsg" placeholder="Comentario (opcional)" rows="2"></textarea>
            <div class="feedback-btns">
                <button class="auth-btn" onclick="submitFeedback()">Enviar</button>
                <button class="clear-btn" onclick="closeFeedback()">Ahora no</button>
            </div>
        </div>
    </div>

    <!-- Auth overlay -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <div class="auth-logo">∑</div>
            <h2>Algor<span>IA</span></h2>
            <p class="auth-subtitle">Tutor de Álgebra · UAI</p>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tabRegister" onclick="switchTab('register')">Registrarme</button>
                <button class="auth-tab" id="tabLogin" onclick="switchTab('login')">Ya tengo cuenta</button>
            </div>

            <!-- Register form -->
            <div class="auth-form" id="formRegister">
                <input class="auth-input" type="text" id="regName" placeholder="Tu nombre" autocomplete="off">
                <input class="auth-input" type="email" id="regEmail" placeholder="Tu email universitario" autocomplete="off">
                <div class="uai-badge" id="uaiBadge">✓ Email UAI verificado</div>
                <input class="auth-input" type="text" id="regPin" placeholder="PIN (4 dígitos)" maxlength="4" autocomplete="off" inputmode="numeric">
                <button class="auth-btn" id="btnRegister" onclick="doRegister()">Crear cuenta</button>
            </div>

            <!-- Login form -->
            <div class="auth-form" id="formLogin" style="display:none">
                <input class="auth-input" type="email" id="loginEmail" placeholder="Tu email" autocomplete="off">
                <input class="auth-input" type="text" id="loginPin" placeholder="PIN (4 dígitos)" maxlength="4" autocomplete="off" inputmode="numeric">
                <button class="auth-btn" id="btnLogin" onclick="doLogin()">Ingresar</button>
            </div>

            <p class="auth-error" id="authError"></p>
        </div>
    </div>

    <!-- Admin gear icon -->
    <a href="admin.html" class="admin-gear" title="Admin">⚙</a>

    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <div class="logo-mark">∑</div>
                <div class="header-title">
                    <h1>Algor<span>IA</span></h1>
                    <p>Tutor inteligente de Álgebra · UAI</p>
                </div>
            </div>
            <div class="header-right">
                <button class="clear-btn" onclick="openHistoryPanel()" title="Ver historial">📋 Historial</button>
                <button class="clear-btn" onclick="clearChat()" title="Limpiar conversación">✕ Limpiar</button>
                <button class="clear-btn" id="logoutBtn" onclick="doLogout()" title="Cerrar sesión" style="display:none">Cerrar sesión</button>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
                <div class="status-badge"><div class="status-dot"></div><span>En línea</span></div>
            </div>
        </header>
        <div class="readonly-banner" id="readonlyBanner">
            <span>📂 Modo lectura — <span id="readonlyDate"></span></span>
            <button onclick="exitReadonlyMode()">← Volver al chat</button>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">∑</div>
                <h2 id="welcomeTitle">¡Hola! Soy Algor<span>IA</span></h2>
                <p class="welcome-greeting" id="welcomeGreeting"></p>
                <p class="welcome-motive" id="welcomeMotive"></p>
                <div class="quick-prompts" id="quickPrompts"></div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="msgInput" rows="1" placeholder="Escribí tu pregunta de Álgebra..." maxlength="500" oninput="autoResize(this);updateCharCounter(this.value.length)" onkeydown="handleKey(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
            <div class="char-counter" id="charCounter">0/500</div>
        </div>
        <footer class="footer">
            <p>Hecho por <strong>Angelo Perrotta</strong> · Ingeniería en Sistemas · <a href="https://www.uai.edu.ar" target="_blank" rel="noopener">UAI</a></p>
        </footer>
    </div>

    <script>
        const BACKEND = 'https://chatbot-educativo-de-lgebra-con-ia-uai-production.up.railway.app';
        const sessionId = 'sess-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9);
        let isWaiting = false;
        let botMsgCount = 0;
        let feedbackShown = !!sessionStorage.getItem('algoria_feedback_shown');
        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');

        // --- Current user from localStorage (persiste entre sesiones) ---
        let currentUser = null;
        try { currentUser = JSON.parse(localStorage.getItem('algoria_user')); } catch(e) {}

        // --- Auth overlay logic ---

        function switchTab(tab) {
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('formRegister').style.display = tab === 'register' ? 'flex' : 'none';
            document.getElementById('formLogin').style.display = tab === 'login' ? 'flex' : 'none';
            document.getElementById('authError').textContent = '';
        }

        function setAuthError(msg) {
            document.getElementById('authError').textContent = msg;
        }

        function setAuthLoading(btn, loading) {
            btn.disabled = loading;
            btn.textContent = loading ? 'Un momento...' : (btn.id === 'btnRegister' ? 'Crear cuenta' : 'Ingresar');
        }

        async function doRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pin = document.getElementById('regPin').value.trim();
            if (!name || !email) { setAuthError('Completá nombre y email.'); return; }
            if (!/^\d{4}$/.test(pin)) { setAuthError('El PIN debe ser exactamente 4 dígitos numéricos.'); return; }
            const btn = document.getElementById('btnRegister');
            setAuthLoading(btn, true);
            setAuthError('');
            try {
                const res = await fetch(`${BACKEND}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, pin })
                });
                const data = await res.json();
                if (!res.ok) { setAuthError(data.detail || 'Error al registrarse.'); return; }
                localStorage.setItem('algoria_user', JSON.stringify(data));
                currentUser = data;
                hideAuthOverlay();
            } catch(e) {
                setAuthError('No se pudo conectar. Revisá tu conexión.');
            } finally {
                setAuthLoading(btn, false);
            }
        }

        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pin = document.getElementById('loginPin').value.trim();
            if (!email) { setAuthError('Ingresá tu email.'); return; }
            if (!/^\d{4}$/.test(pin)) { setAuthError('Ingresá tu PIN de 4 dígitos.'); return; }
            const btn = document.getElementById('btnLogin');
            setAuthLoading(btn, true);
            setAuthError('');
            try {
                const res = await fetch(`${BACKEND}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, pin })
                });
                const data = await res.json();
                if (!res.ok) { setAuthError(data.detail || 'No te encontramos. ¿Ya te registraste?'); return; }
                localStorage.setItem('algoria_user', JSON.stringify(data));
                currentUser = data;
                hideAuthOverlay();
            } catch(e) {
                setAuthError('No se pudo conectar. Revisá tu conexión.');
            } finally {
                setAuthLoading(btn, false);
            }
        }

        function hideAuthOverlay() {
            const overlay = document.getElementById('authOverlay');
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity .3s';
            document.getElementById('logoutBtn').style.display = '';
            setTimeout(() => { overlay.style.display = 'none'; setupWelcome(); msgInput.focus(); }, 300);
        }

        // Allow Enter key in auth inputs
        document.getElementById('regEmail').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
        document.getElementById('regName').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
        document.getElementById('regPin').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
        document.getElementById('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        document.getElementById('loginPin').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        // UAI email badge detection
        document.getElementById('regEmail').addEventListener('input', function() {
            const v = this.value.trim().toLowerCase();
            const badge = document.getElementById('uaiBadge');
            const isUai = v.endsWith('@alumnos.uai.edu.ar') || v.endsWith('@uai.edu.ar');
            badge.style.display = isUai ? 'flex' : 'none';
        });

        // Show or skip auth overlay
        if (currentUser) {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('logoutBtn').style.display = '';
        }

        function doLogout() {
            localStorage.removeItem('algoria_user');
            location.reload();
        }

        function updateCharCounter(n) {
            const el = document.getElementById('charCounter');
            el.textContent = n + '/500';
            el.classList.toggle('warn', n > 450);
        }

        // --- Welcome screen setup ---

        const ALL_QUICK_PROMPTS = [
            'Explicame vectores en R²',
            '¿Cómo resuelvo un sistema 3×3?',
            '¿Qué es una transformación lineal?',
            'Ayudame con matrices inversas',
            '¿Cómo calculo el determinante?',
            '¿Qué son los números complejos?',
            'Explicame la regla de Cramer',
            '¿Qué es el rango de una matriz?',
            '¿Cómo se multiplican matrices?',
            '¿Qué es un autovalor?',
            'Forma polar de un número complejo',
            '¿Cómo factorizo un polinomio?',
            '¿Qué es la proyección ortogonal?',
            'Ayudame con eliminación gaussiana',
            '¿Cuándo un sistema no tiene solución?',
            '¿Qué es la base de un espacio vectorial?',
            '¿Cómo calculo el módulo de un vector?',
            '¿Qué es la traza de una matriz?'
        ];

        const MOTIVATIONAL = [
            'Cada ejercicio resuelto te acerca al parcial aprobado.',
            'Sistemas, matrices, funciones... elegí tu aventura.',
            'El álgebra es la base de todo algoritmo.',
            'Pensá como ingeniero, resolvé como matemático.',
            'Un sistema bien planteado ya está medio resuelto.',
            'La práctica hace al ingeniero — arrancá con algo.',
            'Dale, que las matrices no se resuelven solas.'
        ];

        function getTimeGreeting() {
            const h = new Date().getHours();
            if (h >= 6 && h < 12) return 'Buen día! Arrancamos con Álgebra?';
            if (h >= 12 && h < 18) return 'Buenas tardes! ¿En qué tema andás?';
            if (h >= 18 && h < 24) return 'Buenas noches! Sesión nocturna de Álgebra?';
            return 'Trasnochando con Álgebra? Dale que te ayudo.';
        }

        function setupWelcome() {
            const greeting = getTimeGreeting();
            const motive = MOTIVATIONAL[Math.floor(Math.random() * MOTIVATIONAL.length)];

            if (currentUser) {
                document.getElementById('welcomeGreeting').textContent = `Hola ${currentUser.name}! ${greeting}`;
                document.getElementById('welcomeMotive').style.display = 'none';
            } else {
                document.getElementById('welcomeGreeting').textContent = greeting;
                document.getElementById('welcomeMotive').textContent = motive;
            }

            // Pick 4 random quick prompts
            const shuffled = [...ALL_QUICK_PROMPTS].sort(() => Math.random() - 0.5);
            document.getElementById('quickPrompts').innerHTML = shuffled.slice(0, 4)
                .map(q => `<button class="quick-prompt" onclick="sendQuick(this)">${q}</button>`)
                .join('');
        }

        setupWelcome();

        // --- Particles ---
        (function() {
            const c = document.getElementById('particles'), ctx = c.getContext('2d'); let ps = []; const n = 40;
            function resize() { c.width = innerWidth; c.height = innerHeight; } resize(); addEventListener('resize', resize);
            for (let i = 0; i < n; i++) ps.push({ x: Math.random() * c.width, y: Math.random() * c.height, vx: (Math.random() - .5) * .25, vy: (Math.random() - .5) * .25, r: Math.random() * 1.8 + .4, o: Math.random() * .08 + .02 });
            function draw() {
                ctx.clearRect(0, 0, c.width, c.height);
                ps.forEach(p => { p.x += p.vx; p.y += p.vy; if (p.x < 0 || p.x > c.width) p.vx *= -1; if (p.y < 0 || p.y > c.height) p.vy *= -1; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(56,189,248,${p.o})`; ctx.fill(); });
                for (let i = 0; i < ps.length; i++) for (let j = i + 1; j < ps.length; j++) { const dx = ps[i].x - ps[j].x, dy = ps[i].y - ps[j].y, d = Math.sqrt(dx * dx + dy * dy); if (d < 110) { ctx.beginPath(); ctx.moveTo(ps[i].x, ps[i].y); ctx.lineTo(ps[j].x, ps[j].y); ctx.strokeStyle = `rgba(56,189,248,${.02 * (1 - d / 110)})`; ctx.lineWidth = .5; ctx.stroke(); } }
                requestAnimationFrame(draw);
            } draw();
        })();

        // --- Chat helpers ---

        function renderMath(el) {
            if (typeof renderMathInElement === 'function')
                renderMathInElement(el, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '\\[', right: '\\]', display: true }, { left: '$', right: '$', display: false }, { left: '\\(', right: '\\)', display: false }], throwOnError: false, trust: true });
        }

        function sendQuick(el) { msgInput.value = el.textContent; sendMessage(); }
        function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function formatResponse(text) {
            text = text.replace(/^\s+/, '');
            const lb = [];
            text = text.replace(/\$\$([\s\S]*?)\$\$/g, (_, m) => { lb.push('$$' + m + '$$'); return `%%L${lb.length - 1}%%`; });
            text = text.replace(/\\\[([\s\S]*?)\\\]/g, (_, m) => { lb.push('\\[' + m + '\\]'); return `%%L${lb.length - 1}%%`; });
            text = text.replace(/\$(.+?)\$/g, (_, m) => { lb.push('$' + m + '$'); return `%%L${lb.length - 1}%%`; });
            text = text.replace(/\\\((.+?)\\\)/g, (_, m) => { lb.push('\\(' + m + '\\)'); return `%%L${lb.length - 1}%%`; });
            let h = escapeHtml(text);
            h = h.replace(/%%L(\d+)%%/g, (_, i) => lb[parseInt(i)]);
            h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            h = h.replace(/__(.+?)__/g, '<strong>$1</strong>');
            h = h.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
            h = h.replace(/`(.+?)`/g, '<code>$1</code>');
            h = h.replace(/\$\$([\s\S]*?)\$\$/g, (_, m) => '$$' + m.replace(/\n/g, '%%NEWLINE%%') + '$$');
            h = h.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('');
            h = h.replace(/\n/g, '<br>');
            h = h.replace(/%%NEWLINE%%/g, '\n');
            return h;
        }

        function addMessage(role, content) {
            if (welcome) welcome.style.display = 'none';
            const msg = document.createElement('div'); msg.className = `message ${role}`;
            const av = document.createElement('div'); av.className = 'message-avatar'; av.textContent = role === 'bot' ? 'A' : '👤';
            const bb = document.createElement('div'); bb.className = 'message-content';
            bb.innerHTML = role === 'bot' ? formatResponse(content) : `<p>${escapeHtml(content)}</p>`;
            msg.appendChild(av); msg.appendChild(bb); chatArea.appendChild(msg);
            if (role === 'bot') renderMath(bb);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping() {
            const el = document.createElement('div'); el.className = 'typing-indicator'; el.id = 'typingIndicator';
            el.innerHTML = `<div class="message-avatar" style="background:var(--user-bubble);color:#fff;font-weight:700;box-shadow:0 2px 10px var(--accent-glow)">A</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
            chatArea.appendChild(el); chatArea.scrollTop = chatArea.scrollHeight;
        }
        function hideTyping() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || isWaiting) return;
            isWaiting = true; sendBtn.disabled = true; msgInput.value = ''; msgInput.style.height = 'auto';
            addMessage('user', text); showTyping();
            try {
                const body = { message: text, materia: 'algebra', session_id: sessionId };
                if (currentUser) body.user_email = currentUser.email;

                const res = await fetch(`${BACKEND}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                hideTyping();

                if (res.status === 429) {
                    addMessage('bot', 'Llegaste al límite de consultas por ahora. Contactá al profesor para ampliar tu acceso.');
                    return;
                }
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || `Error ${res.status}`);
                }
                const data = await res.json();
                addMessage('bot', data.response);
                addSuggestions(data.response);
                botMsgCount++;
                if (botMsgCount === 5 && !feedbackShown) showFeedbackPopup();
            } catch (err) {
                hideTyping();
                addMessage('bot', `Error de conexión: ${err.message}\n\nReintentá en unos segundos.`);
            } finally {
                isWaiting = false; sendBtn.disabled = false; msgInput.focus();
            }
        }

        async function clearChat() {
            try { await fetch(`${BACKEND}/reset`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: sessionId }) }); } catch (e) {}
            chatArea.querySelectorAll('.message,.typing-indicator').forEach(el => el.remove());
            if (welcome) welcome.style.display = 'flex';
        }

        if (currentUser) msgInput.focus();

        // --- Theme ---
        (function() {
            if (localStorage.getItem('algoria_theme') === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeToggle').textContent = '☀️';
            }
        })();

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light');
            localStorage.setItem('algoria_theme', isLight ? 'light' : 'dark');
            document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
        }

        // --- History panel ---
        async function openHistoryPanel() {
            if (!currentUser) return;
            document.getElementById('historyPanel').classList.add('open');
            document.getElementById('historyBackdrop').classList.add('open');
            const list = document.getElementById('historyList');
            list.innerHTML = '<div class="history-empty">Cargando...</div>';
            try {
                const res = await fetch(`${BACKEND}/history/${encodeURIComponent(currentUser.email)}`);
                if (!res.ok) throw new Error();
                const sessions = await res.json();
                if (!sessions.length) {
                    list.innerHTML = '<div class="history-empty">No hay conversaciones anteriores.</div>';
                    return;
                }
                list.innerHTML = sessions.map(s => {
                    const dt = s.started_at ? s.started_at.slice(0,16).replace('T',' ') : '—';
                    const raw = s.preview || '(sin mensajes)';
                    const preview = raw.length > 50 ? raw.slice(0, 50) + '…' : raw;
                    return `<div class="history-session" onclick="loadHistorySession('${escapeHtml(s.session_id)}','${escapeHtml(dt)}')">
                        <div style="display:flex;align-items:flex-start;gap:9px">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-muted);flex-shrink:0;margin-top:2px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                            <div>
                                <div class="history-session-date">${dt}</div>
                                <div class="history-session-preview">${escapeHtml(preview)}</div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) {
                list.innerHTML = '<div class="history-empty">Error al cargar el historial.</div>';
            }
        }

        function closeHistoryPanel() {
            document.getElementById('historyPanel').classList.remove('open');
            document.getElementById('historyBackdrop').classList.remove('open');
        }

        let savedChatHTML = null;

        async function loadHistorySession(sid, dateLabel) {
            closeHistoryPanel();
            try {
                const res = await fetch(`${BACKEND}/history/${encodeURIComponent(currentUser.email)}/${encodeURIComponent(sid)}`);
                if (!res.ok) throw new Error();
                const messages = await res.json();
                savedChatHTML = chatArea.innerHTML;
                chatArea.innerHTML = '';
                if (welcome) welcome.style.display = 'none';
                for (const msg of messages) {
                    addMessage(msg.role === 'user' ? 'user' : 'bot', msg.content);
                }
                const banner = document.getElementById('readonlyBanner');
                document.getElementById('readonlyDate').textContent = dateLabel;
                banner.style.display = 'flex';
                msgInput.disabled = true;
                sendBtn.disabled = true;
                msgInput.placeholder = 'Modo lectura — no podés enviar mensajes aquí';
            } catch(e) {
                savedChatHTML = null;
            }
        }

        function exitReadonlyMode() {
            if (savedChatHTML !== null) {
                chatArea.innerHTML = savedChatHTML;
                savedChatHTML = null;
            }
            document.getElementById('readonlyBanner').style.display = 'none';
            msgInput.disabled = false;
            sendBtn.disabled = false;
            msgInput.placeholder = 'Escribí tu pregunta de Álgebra...';
            msgInput.focus();
        }

        // --- Suggestions ---
        const SUGGESTION_TEMPLATES = {
            matrix: ['¿Podés mostrarme un ejemplo con números?', '¿Cómo se calcula la inversa?', '¿Cuándo una matriz no tiene inversa?'],
            determinant: ['¿Podés hacer un ejemplo 3×3?', '¿Cuándo el determinante es cero?', '¿Cómo aplico la regla de Sarrus?'],
            system: ['¿Podés resolverlo con eliminación de Gauss?', '¿Cuándo un sistema no tiene solución?', '¿Cómo uso la regla de Cramer?'],
            vector: ['¿Podés mostrar el módulo paso a paso?', '¿Cómo verifico si dos vectores son paralelos?', '¿Qué es el producto escalar?'],
            complex: ['¿Cómo paso este número a forma polar?', '¿Podés dar un ejemplo de multiplicación?', '¿Cómo calculo el módulo de un complejo?'],
            function: ['¿Podés graficar un ejemplo?', '¿Cómo encuentro el dominio?', '¿Cómo determino la imagen?'],
            equation: ['¿Podés resolverlo paso a paso?', '¿Cómo verifico si el resultado es correcto?', '¿Qué pasa si hay más de una solución?'],
            conic: ['¿Podés escribir la ecuación canónica?', '¿Cómo identifico el tipo de cónica?', '¿Dónde están el foco y la directriz?'],
            default: ['¿Podés darme un ejemplo concreto?', '¿Cómo se resuelve paso a paso?', '¿Podés proponerme un ejercicio?'],
        };

        function generateSuggestions(text) {
            const t = text.toLowerCase();
            let tmpl;
            if (/matriz|matrices|transpuesta|inversa/.test(t)) tmpl = SUGGESTION_TEMPLATES.matrix;
            else if (/determinante|sarrus|laplace|cofactor/.test(t)) tmpl = SUGGESTION_TEMPLATES.determinant;
            else if (/sistema|ecuaciones lineales|gauss|cramer|rouché/.test(t)) tmpl = SUGGESTION_TEMPLATES.system;
            else if (/vector|módulo|producto escalar|paralel/.test(t)) tmpl = SUGGESTION_TEMPLATES.vector;
            else if (/complejo|binómica|polar|trigonométric/.test(t)) tmpl = SUGGESTION_TEMPLATES.complex;
            else if (/función|dominio|imagen|polinómica|exponencial|logarítm/.test(t)) tmpl = SUGGESTION_TEMPLATES.function;
            else if (/ecuación|raíz|solución|despejá|inecuac/.test(t)) tmpl = SUGGESTION_TEMPLATES.equation;
            else if (/cónica|circunferencia|elipse|hipérbola|parábola/.test(t)) tmpl = SUGGESTION_TEMPLATES.conic;
            else tmpl = SUGGESTION_TEMPLATES.default;
            const shuffled = [...tmpl].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, 2 + Math.floor(Math.random() * 2));
        }

        function addSuggestions(text) {
            const suggestions = generateSuggestions(text);
            const div = document.createElement('div');
            div.className = 'suggestions';
            div.innerHTML = suggestions.map(s => `<button class="suggestion-btn" onclick="sendQuick(this)">${escapeHtml(s)}</button>`).join('');
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // --- Feedback popup ---

        let selectedRating = 0;

        function showFeedbackPopup() {
            feedbackShown = true;
            sessionStorage.setItem('algoria_feedback_shown', '1');
            selectedRating = 0;
            document.querySelectorAll('.star').forEach(s => s.classList.remove('selected'));
            document.getElementById('feedbackMsg').value = '';
            document.getElementById('feedbackOverlay').style.display = 'flex';
        }

        function closeFeedback() {
            document.getElementById('feedbackOverlay').style.display = 'none';
        }

        document.getElementById('starRow').addEventListener('click', function(e) {
            if (!e.target.classList.contains('star')) return;
            selectedRating = parseInt(e.target.dataset.v);
            document.querySelectorAll('.star').forEach(s => {
                s.classList.toggle('selected', parseInt(s.dataset.v) <= selectedRating);
            });
        });

        async function submitFeedback() {
            if (!selectedRating) { return; }
            const message = document.getElementById('feedbackMsg').value.trim() || null;
            const user_email = currentUser ? currentUser.email : 'anónimo';
            try {
                await fetch(`${BACKEND}/feedback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_email, rating: selectedRating, message })
                });
            } catch(e) {}
            closeFeedback();
        }
    </script>
</body>
</html>
